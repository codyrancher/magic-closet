apiVersion: apps/v1
kind: Deployment
metadata:
  name: project
  labels: { app: project }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: project }
  template:
    metadata:
      labels: { app: project }
    spec:
      containers:
        - name: project
          image: {{ .Values.images.project }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef: { name: closet-secrets }
            - configMapRef: { name: closet-config }
          ports:
            - containerPort: 8005
          volumeMounts:
            - { name: workspace, mountPath: /workspace }
            - { name: claude-data, mountPath: /claude-data }
      volumes:
        - name: workspace
          persistentVolumeClaim: { claimName: workspace }
        - name: claude-data
          persistentVolumeClaim: { claimName: claude-data }
---
apiVersion: v1
kind: Service
metadata:
  name: project
spec:
  selector: { app: project }
  ports:
    - { name: dev, port: 8005, targetPort: 8005 }
