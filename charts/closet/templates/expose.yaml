{{- if .Values.expose.nodePort }}
apiVersion: v1
kind: Service
metadata:
  name: closet-nodeports
spec:
  type: NodePort
  selector: { app: api }
  ports:
    - { name: api-http, port: 8080, targetPort: 8080 }
    - { name: api-https, port: 8443, targetPort: 8443 }
{{- range $svc := list "vscode" "rancher" "keycloak" "rancher-browser" }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc }}-external
spec:
  type: NodePort
  selector: { app: {{ $svc }} }
  ports:
{{- if eq $svc "vscode" }}
    - { name: http, port: 9000, targetPort: 9000 }
{{- else if eq $svc "rancher" }}
    - { name: https, port: 443, targetPort: 443 }
{{- else if eq $svc "keycloak" }}
    - { name: http, port: 8080, targetPort: 8080 }
{{- else }}
    - { name: https, port: 3001, targetPort: 3001 }
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.expose.ingress.enabled }}
{{- $host := .Values.expose.ingress.host }}
{{- $ns := .Release.Namespace }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: closet
spec:
  rules:
    - host: {{ printf "closet.%s" $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: api, port: { number: 8080 } } }
    - host: {{ printf "vscode.%s" $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: vscode, port: { number: 9000 } } }
    - host: {{ printf "rancher.%s" $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: rancher, port: { number: 80 } } }
{{- end }}
