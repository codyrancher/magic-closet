apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher-browser
  labels: { app: rancher-browser }
spec:
  replicas: {{ ternary 1 0 .Values.sidecars.rancherBrowser }}
  selector:
    matchLabels: { app: rancher-browser }
  template:
    metadata:
      labels: { app: rancher-browser }
    spec:
      # Renders the Quick Login / command-menu extension (files ship in the
      # api image) with credentials from the closet env — the k8s twin of the
      # compose sidecar's ext-init script
      initContainers:
        - name: ext-init
          image: {{ .Values.images.api }}
          imagePullPolicy: Always
          envFrom:
            - secretRef: { name: closet-secrets }
            - configMapRef: { name: closet-config }
          command:
            - /bin/sh
            - -c
            - |
              SRC=/app/sidecars/dev/rancher-browser/extension
              cp "$SRC"/manifest.json "$SRC"/*.js "$SRC"/*.css /ext/
              cp /app/sidecars/dev/rancher-browser/cdp-proxy /svc/cdp-proxy
              cp /app/sidecars/dev/rancher-browser/viewer-init /init/viewer-init
              chmod +x /svc/cdp-proxy /init/viewer-init
              cat > /ext/config.js <<EOF
              // Generated at pod start from the closet env
              var MC_CONFIG = {
                creds: [
                  { label: 'Admin', username: 'admin', password: '${RANCHER_BOOTSTRAP_PASSWORD}' },
                  { label: 'User 1', username: 'user1', password: '${RANCHER_USER1_PASSWORD}' },
                  { label: 'User 2', username: 'user2', password: '${RANCHER_USER2_PASSWORD}' },
                  { label: 'User 3', username: 'user3', password: '${RANCHER_USER3_PASSWORD}' },
                ],
                keycloakCreds: [
                  { label: 'Keycloak Admin', username: 'admin', password: '${KEYCLOAK_ADMIN_PASSWORD}' },
                  { label: 'User 1', username: 'user1', password: '${RANCHER_USER1_PASSWORD}' },
                  { label: 'User 2', username: 'user2', password: '${RANCHER_USER2_PASSWORD}' },
                  { label: 'User 3', username: 'user3', password: '${RANCHER_USER3_PASSWORD}' },
                ],
                appco: { email: '${APPCO_EMAIL}', token: '${APPCO_TOKEN}' },
              };
              EOF
              chmod -R a+rX /ext
          volumeMounts:
            - { name: autofill-ext, mountPath: /ext }
            - { name: custom-services, mountPath: /svc }
            - { name: custom-init, mountPath: /init }
      containers:
        - name: chromium
          image: {{ .Values.images.rancherBrowser }}
          imagePullPolicy: IfNotPresent
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: CUSTOM_PORT, value: "3000" }
            - { name: CHROME_CLI, value: "https://rancher --no-first-run --start-maximized --disable-infobars --allow-insecure-localhost --ignore-certificate-errors --remote-debugging-port=9222 --remote-debugging-address=0.0.0.0 --load-extension=/opt/autofill-ext --allow-running-insecure-content" }
          ports:
            - containerPort: 3000
            - containerPort: 3001
            - containerPort: 9222
          volumeMounts:
            - { name: autofill-ext, mountPath: /opt/autofill-ext }
            - { name: custom-services, mountPath: /custom-services.d }
            - { name: custom-init, mountPath: /custom-cont-init.d }
      volumes:
        - name: autofill-ext
          emptyDir: {}
        - name: custom-services
          emptyDir: {}
        - name: custom-init
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rancher-browser
spec:
  selector: { app: rancher-browser }
  ports:
    - { name: http, port: 3000, targetPort: 3000 }
    - { name: https, port: 3001, targetPort: 3001 }
    - { name: cdp, port: 9222, targetPort: 9222 }
