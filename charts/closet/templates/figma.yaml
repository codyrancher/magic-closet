apiVersion: apps/v1
kind: Deployment
metadata:
  name: figma
  labels: { app: figma }
spec:
  replicas: {{ ternary 1 0 .Values.sidecars.figma }}
  selector:
    matchLabels: { app: figma }
  template:
    metadata:
      labels: { app: figma }
    spec:
      containers:
        - name: figma
          image: {{ .Values.images.figma }}
          imagePullPolicy: IfNotPresent
          env:
            - name: FIGMA_API_KEY
              valueFrom:
                configMapKeyRef: { name: closet-config, key: FIGMA_API_KEY }
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: figma
spec:
  selector: { app: figma }
  ports:
    - { name: http, port: 8000, targetPort: 8000 }
