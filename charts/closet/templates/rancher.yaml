apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher
  labels: { app: rancher }
spec:
  replicas: {{ ternary 1 0 .Values.sidecars.rancher }}
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: rancher }
  template:
    metadata:
      labels: { app: rancher }
    spec:
      # Without this, rancher sees the mounted SA token, assumes it's an
      # in-cluster HA install, and crash-loops on RBAC instead of starting
      # its own embedded k3s
      automountServiceAccountToken: false
      containers:
        - name: rancher
          image: {{ .Values.images.rancher }}
          # Private cgroup+mount namespace: without it the embedded k3s's
          # kubelet sees the host cluster's cgroup tree and destroys other
          # pods' cgroups as "orphans". Even with it, the docker-style
          # rancher image does not survive as a pod (its kubelet's node-level
          # cgroup management makes the outer runtime kill the container) —
          # which is why sidecars.rancher defaults to false in values.yaml.
          command: ["unshare", "--cgroup", "--mount", "sh", "-c", "mount -t cgroup2 none /sys/fs/cgroup; exec entrypoint.sh"]
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            - name: CATTLE_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef: { name: closet-secrets, key: RANCHER_BOOTSTRAP_PASSWORD }
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - { name: rancher-data, mountPath: /var/lib/rancher }
      volumes:
        - name: rancher-data
{{- if eq .Values.storage.mode "pvc" }}
          persistentVolumeClaim: { claimName: rancher-data }
{{- else }}
          hostPath:
            path: {{ .Values.storage.hostPathBase }}/{{ .Release.Namespace }}/rancher-data
            type: DirectoryOrCreate
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: rancher
spec:
  selector: { app: rancher }
  ports:
    - { name: http, port: 80, targetPort: 80 }
    - { name: https, port: 443, targetPort: 443 }
