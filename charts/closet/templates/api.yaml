apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      serviceAccountName: closet-api
      containers:
        - name: api
          image: {{ .Values.images.api }}
          imagePullPolicy: Always
          workingDir: /app
          envFrom:
            - secretRef: { name: closet-secrets }
            - configMapRef: { name: closet-config }
          ports:
            - containerPort: 8080
            - containerPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: { app: api }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: https, port: 8443, targetPort: 8443 }
