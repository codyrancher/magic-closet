# FreeIPA server (auth group). First start runs ipa-server-install, which
# takes 5-15 minutes — the api's bootstrap waits for LDAP to answer, then
# creates users user1-3 and, when RANCHER_AUTH_PROVIDER=freeipa, connects
# Rancher's FreeIPA auth. Realm MAGIC-CLOSET.LOCAL; admin password and
# Directory Manager password are both FREEIPA_ADMIN_PASSWORD.
services:
  freeipa:
    image: quay.io/freeipa/freeipa-server:almalinux-9-4.12.2
    profiles: ["freeipa"]
    hostname: ipa.magic-closet.local
    privileged: true
    env_file:
      - path: ${MC_ENV_FILE:-./.env}
        required: false
    environment:
      - PASSWORD=${FREEIPA_ADMIN_PASSWORD:-}
    command: ["ipa-server-install", "-U", "-r", "MAGIC-CLOSET.LOCAL", "--no-ntp"]
    volumes:
      - ./tools:/opt/magic-closet/tools:ro
      - freeipa-data:/data
    restart: unless-stopped

volumes:
  freeipa-data:
