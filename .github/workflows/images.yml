name: Build container images

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            context: .
            dockerfile: api/Dockerfile
          - name: project
            context: project
            dockerfile: project/Dockerfile
          - name: vscode
            context: sidecars/dev/vscode
            dockerfile: sidecars/dev/vscode/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/codyrancher/magic-closet-${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/codyrancher/magic-closet
